name: Release Windows portable exe

# Builds the portable .exe and attaches it to a GitHub Release whenever a
# version tag (v1.0.0, v1.1.0, ...) is pushed. Visitors then grab the file
# from the repo's Releases page — no terminal, no build step.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portable exe
        run: pnpm dist:win

      - name: Publish GitHub Release with the exe
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
          # workflow_dispatch runs have no tag — publish as a draft the
          # maintainer can name and release from the UI.
          draft: ${{ github.ref_type != 'tag' }}
